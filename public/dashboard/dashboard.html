<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaTech | Dashboards</title>


    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- scripts do Chart.js - 2022-1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!--FONT AWESOME-->
    <script src="https://kit.fontawesome.com/9f7414eb10.js" crossorigin="anonymous"></script>
</head>



<body>

    <div class="janela">
        <div class="header-left">
            <img src="LogoAutoSpa (1).jpg" width="80" height="80" />


            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./cards.html">
                    <h3>QUIZ</h3>
                </a>
            </div>

            <div class="btn-nav">

                <h3>Gráficos</h3>

            </div>


            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>


        <div class="dash">
            <div id="alerta">
            </div>
            <div class="area-parametros-alerta">
                <p class="titulo-legenda">
                    Legenda - Parâmetros do QUIZ
                </p>
                <div class="parametros-alerta">
                    <div class="item-regua perigo-frio">
                        <p>Porcentagem de acertos!</p>
                        <p id="porcent_acertos"></p>%
                    </div>
                    <div class="item-regua alerta-frio">
                        <p>Porcentagem de erros!</p>
                        <p id="porcent_erros"></p>%
                   

                    </div>
                       <br><br><br><br><br><br><br><br><br><br><br><br>
                </div>
                    <div class="parametros-alerta">
                        <div class="item-regua perigo-frio">
                            <p>Quantidade de acertos!</p>
                            <p id="quant_acertos"></p>
                        </div>
                        <div class="item-regua alerta-frio">
                            <p>Quantidade de erros!</p>
                            <p id="quant_erros"></p> </div>
                        </div>

                        <br>






                    </div>
                    <div id="graficos">

                        <div class="grafico_pizza">
                            <canvas id="myChartCanvasPizza"></canvas>
                        </div>

                        <br>

                        <div class="grafico_barra">
                            <canvas id="myChartCanvas"></canvas>
                        </div>
                    </div>
                </div>

            </div>
        </div>


</body>

</html>

<script>

    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;
    window.onload = exibirQuiz;

    function exibirQuiz() {
        var cont_acertos = (sessionStorage.ACERTOS)

        var cont_erros = (sessionStorage.ERROS)

        var porcentagem_acerto = (sessionStorage.PORCENT_ACERTO)

        var porcentagem_erro = (sessionStorage.PORCENT_ERRO)

        porcent_erros.innerHTML=porcentagem_erro;
        quant_acertos.innerHTML=cont_acertos;
        quant_erros.innerHTML=cont_erros;
          var ctx = document.getElementById('myChartCanvasPizza').getContext('2d');
        porcent_acertos.innerHTML=porcentagem_acerto;
        var myChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Acerto%', 'Erro%'],

                datasets: [
                    {
                        label: ['%'],
                        data: [porcentagem_acerto, porcentagem_erro],
                        backgroundColor:
                            ['green', 'red'],

                        borderWidth: 1,
                        barPercentage: 0.2
                    },


                ]

            },

        });



        var ctx = document.getElementById('myChartCanvas').getContext('2d');

        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Resultado'],
                datasets: [
                    {
                        label: 'Acertos',
                        data: [cont_acertos],
                        backgroundColor:
                            ['green'],
                        borderWidth: 1,
                        barPercentage: 0.5
                    },
                    {
                        label: 'Erros',
                        data: [cont_erros],
                        backgroundColor:
                            ['red'],
                        borderWidth: 1,
                        barPercentage: 0.5


                    }]

            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        min: 0,
                        max: 15,
                        ticks: {
                            autoSkip: false,
                            stepSize: 1
                        }

                    }
                }
            }
        });



    }




</script>
