<script>

    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    let proximaAtualizacao;

    window.onload = exibirQuiz;

    function exibirQuiz() {
        var acertos = Number(sessionStorage.ACERTOS)
        var erros = Number(sessionStorage.ERROS)
        var porcentagem_acerto = Number(sessionStorage.PORCENT_ACERTO)
        var porcentagem_erro = Number(sessionStorage.PORCENT_ERRO)


        var ctx = document.getElementById('myChartCanvas').getContext('2d');
       
        var myChart = new Chart(ctx, {
            type: 'bar', 
            data: { 
                labels: ['Resultado'], // Rótulos no eixo X
                datasets: [
                    {
                    label: 'Acerto', // Nome do conjunto de dados
                    data: [acertos],
                    backgroundColor: 
                        ['green'], 
                        borderWidth: 1, // Largura da borda das barras
                        barPercentage: 0.5
                    },
                 {label: 'Erro', // Nome do conjunto de dados
                    data: [erros],
                    backgroundColor: 
                        ['red'], 
                        borderWidth: 1, // Largura da borda das barras
                        barPercentage: 0.5

                    
                }
            ]

        },
options:{
    scales:{
        y:{
            beginAtZero: true,
            ticks:{
                
                stepSize:1
            }
        }
    }
}
        });
    }

    

</script>
