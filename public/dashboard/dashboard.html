<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/LogoAutoSpa (1).jpg" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSpa | Dashboards</title>


    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- scripts do Chart.js - 2022-1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!--FONT AWESOME-->
    <script src="https://kit.fontawesome.com/9f7414eb10.js" crossorigin="anonymous"></script>
</head>



<body>

    <div class="janela">
        <div class="header-left">
            <img src="logo.png" width="150" height="150" />


            <div class="hello">
                <h2>Olá, <span id="b_usuario">usuário</span>!</h2>
            </div>

            <div class="btn-nav-white">
                <a href="./cards.html">
                    <h3> <img src="informacoes.png" width="20" height="20" />Quiz</h3>

                </a>
            </div>

            <div class="btn-nav">

                <h3> <img src="grafico-de-linha.png" width="20" height="20" />Gráficos</h3>

            </div>

            <div class="btn-nav-white">
                <a href="./ranking.html">
                    <h3> <img src="ranking.png" width="20" height="20" />Ranking</h3>
                </a>
            </div>



            <div class="btn-logout" onclick="limparSessao()">
                <h3> <img src="sair.png" width="17" height="17" />Sair</h3>
            </div>

        </div>


        <div class="dash">

            <div id="alerta">
            </div>

            <div id="graficos">
                <!-- INDICADORES EM CIMA -->

                <!-- PIZZA -->

                <div class="borda_grafico">

                    <div class="grafico-container">
                        <div class="titulo-grafico">
                            <h2>Desempenho em porcentagem</h2>
                        </div>
                        <div class="overlay-info">
                            <div class="item-regua perigo-frio">
                                <p>Acertos </p>
                                <p id="porcent_acertos"></p>%
                            </div>

                            <div class="item-regua alerta-frio">
                                <p>Erros</p>
                                <p id="porcent_erros"></p>%
                            </div>

                        </div>
                        <div class="grafico_pizza"></div>
                        <canvas id="myChartCanvasPizza"></canvas>
                    </div>
                </div>
            </div>
            <!-- BARRA -->

            <div class="borda_grafico">

                <div class="grafico-container">
                    <div class="titulo-grafico">
                        <h2>Quantidade de acertos e erros</h2>
                    </div>
                    <div class="overlay-info">
                        <div class="item-regua perigo-frio">
                            <p>Acertos</p>
                            <p id="quant_acertos"></p>
                        </div>
                        

                        <div class="item-regua alerta-frio">
                            <p>Erros</p>
                            <p id="quant_erros"></p>
                        </div>
                       
                    </div>
                    <div class="grafico_barra">
                        <canvas id="myChartCanvas"></canvas>
                    </div>
                </div>

            </div>

        </div>
</body>

</html>
<script>


    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    // Quando a página carregar, vai chama a função obterDadosGrafico()
    window.onload = obterDadosGrafico;


    // Esta função *obterDadosGrafico* busca os últimos dados inseridos.
    // para, quando carregar o gráfico da primeira vez, já trazer com vários dados.
    // A função *obterDadosGrafico* também invoca a função *plotarGrafico*

    // ELA É FUNÇÃO QUE VAI BUSCAR MEUS DADOS NO BACK-END

    function obterDadosGrafico() {

        // Mostro no console o ID do usuário
        console.log("ID USUARIO:", sessionStorage.ID_USUARIO)

        // Faz uma requisição GET para buscar os dados do quiz do usuário
        fetch(`/quiz/buscar/${sessionStorage.ID_USUARIO}`, { cache: 'no-store' })

            // Quando a resposta bruta chegar então:
            .then(function (response) {


                if (response.ok) {

                    // Converto essa resposta bruta para JSON
                    response.json().then(function (resposta) {

                        // dados recebidos pelo console
                        console.log(resposta);

                        //  dados formatados
                        console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);

                      
                      

                        // Envio os dados para a função que cria os gráficos
                        plotarGrafico(resposta);
                        AtualizarGrafico()
                    });

                } else {


                    console.error('Nenhum dado encontrado ou erro na API');

                }
            })

            // Erro no fech
            .catch(function (error) {

                console.error(`Erro: ${error.message}`);

            });
    }




    //  *plotarGrafico* usa os dados capturados na função anterior para criar o gráfico

    function plotarGrafico(resposta) {

        // Pega o  registro do array LIMIT 1 do meu model
        
        let dados = resposta[0];




        let cont_acertos = dados.acertos;
        let cont_erros = dados.erros;
        let total = cont_acertos + cont_erros;



        let porcent_acerto = ((cont_acertos / total) * 100).toFixed(0);


        let porcent_erro = ((cont_erros / total) * 100).toFixed(0);




        porcent_acertos.innerHTML = porcent_acerto;
        porcent_erros.innerHTML = porcent_erro;




        quant_acertos.innerHTML = cont_acertos;
        quant_erros.innerHTML = cont_erros;




        // Seleciona o canvas do gráfico de pizza
        var ctxPizza = document.getElementById('myChartCanvasPizza').getContext('2d');



        // Cria o gráfico usando Chart.js
        graficoPizza = new Chart(ctxPizza, {


            type: 'pie',


            data: {


                labels: ['Acerto%', 'Erro%'],

                datasets: [
                    {

                        label: ['%'],


                        data: [porcent_acerto, porcent_erro],


                        backgroundColor: ['blue', 'red'],


                        borderWidth: 1,


                        barPercentage: 0.2
                    },
                ]
            },
        });





        // Seleciono o canvas do gráfico de barras
        var ctxBarra = document.getElementById('myChartCanvas').getContext('2d');




        graficoBarra = new Chart(ctxBarra, {


            type: 'bar',

            data: {

              
                labels: ['Resultado'],

                datasets: [


                    {
                        label: 'Acertos',


                        data: [cont_acertos],


                        backgroundColor: ['blue'],

                        borderWidth: 1,


                        barPercentage: 0.5
                    },




                    {
                        label: 'Erros',


                        data: [cont_erros],


                        backgroundColor: ['red'],

                        borderWidth: 1,


                        barPercentage: 0.5
                    }
                ]
            },




            options: {

                scales: {


                    y: {


                        beginAtZero: true,


                        min: 0,


                        max: 15,


                        ticks: {

                            // Não vai pulo  os números Ex: 2,4,6,8 .... 
                            autoSkip: false,

                            // Vai de 1 em 1
                            stepSize: 1
                        }
                    }
                }
            }
        });
    }


 let proximaAtualizacao;

    function AtualizarGrafico(){
        fetch(`/quiz/buscar/${sessionStorage.ID_USUARIO}`,{cache:'no-store'}).then(function (response) {
        if (response.ok) {
                response.json().then(function (novoRegistro) {
                     console.log(`Dados recebidos: ${JSON.stringify(novoRegistro)}`);
                    console.log(novoRegistro);
                    

                     let dados = novoRegistro[0];




        let cont_acertos = dados.acertos;
        let cont_erros = dados.erros;
        let total = cont_acertos + cont_erros;



        let porcent_acerto = ((cont_acertos / total) * 100).toFixed(0);


        let porcent_erro = ((cont_erros / total) * 100).toFixed(0);



       //   Atualiza indicadores
        porcent_acertos.innerHTML = porcent_acerto;
        porcent_erros.innerHTML = porcent_erro;




        quant_acertos.innerHTML = cont_acertos;
        quant_erros.innerHTML = cont_erros;

        // Atualiza Gráfico de pizza
        graficoPizza.data.datasets[0].data[0]=porcent_acerto
        graficoPizza.data.datasets[0].data[1]=porcent_erro
        graficoPizza.update();

         // Atualiza Gráfico de Barra
        graficoBarra.data.datasets[0].data[0]=cont_acertos
        graficoBarra.data.datasets[1].data[0]=cont_erros
        graficoBarra.update();
  

        
                    proximaAtualizacao = setTimeout(() => {
                        AtualizarGrafico();
                    }, 2000);
             });
            } else {

                console.error("Nenhum dado encontrado");

                proximaAtualizacao = setTimeout(() => {
                    AtualizarGrafico();
                }, 2000);

            }

        })
            .catch(function (erro) {
                console.error("Erro:", erro);
            });

    }
</script>
