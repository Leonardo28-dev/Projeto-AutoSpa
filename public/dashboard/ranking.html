<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;
    // Função que buscar o ranking no backend
    function buscarRanking() {
        // Faz uma requisição para a rota /ranking/listar
        fetch("/ranking/listar")
            // Quando a resposta chegar do backend
            .then(function (resposta) {
                // CONVERTO A RESPOSTA PARA JSON
                resposta.json().then(function (dados) {
                    // Dados é o meu array
                    console.log(dados);
                    // dados[0].nome ----> primeiro nome na primeira posição do meu array ...
                    primeiro.innerHTML = `
                    
                    ${dados[0].nome}
                    ${dados[0].acertos}
                    
                    
                    `;
                    segundo.innerHTML = `
                    ${dados[1].nome}
                    ${dados[1].acertos}
                    
                    
                    `;
                    terceiro.innerHTML = `
                    ${dados[2].nome}
                    ${dados[2].acertos}
                    
                    
                     `;
                    quarto.innerHTML = `
                    ${dados[3].nome}
                    ${dados[3].acertos}
                    
                    
                     `;
                    quinto.innerHTML = `
                    ${dados[4].nome}
                    ${dados[4].acertos}
                    
                    
                      `;
                    sexto.innerHTML = `
                    ${dados[5].nome}
                    ${dados[5].acertos}
                    
                    
                     `;
                    setimo.innerHTML = `
                    ${dados[6].nome}
                    ${dados[6].acertos}
                    
                    
                     `;
                    oitavo.innerHTML = `
                    ${dados[7].nome}
                    ${dados[7].acertos}
                    
                    
                    `;
                });
            });



    }
    // Chamo a função atualizarRanking 
    AtualizarRanking();

    function AtualizarRanking() {
        fetch(`/ranking/listar`, { cache: 'no-store' })
        .then(function (response) {
            if (response.ok) {
                response.json().then(function (dados) {
                    console.log("Ranking Atualizado");
                    console.log(dados)
                    primeiro.innerHTML = `
                    
                    ${dados[0].nome}
                    ${dados[0].acertos};
                    
                    
                     `;
                    segundo.innerHTML = `
                    ${dados[1].nome}
                    ${dados[1].acertos};
                    
                    
                     `;
                    terceiro.innerHTML = `
                    ${dados[2].nome}
                    ${dados[2].acertos};
                    
                    
                     `;
                    quarto.innerHTML = `
                    ${dados[3].nome}
                    ${dados[3].acertos};
                    
                    
                     `;
                    quinto.innerHTML = `
                    ${dados[4].nome}
                    ${dados[4].acertos};
                    
                    
                     `;
                    sexto.innerHTML = `
                    ${dados[5].nome}
                    ${dados[5].acertos};
                    
                    
                     `;
                    setimo.innerHTML = `
                    ${dados[6].nome}
                    ${dados[6].acertos};
                    
                    
                     `;
                    oitavo.innerHTML = `
                    ${dados[7].nome}
                    ${dados[7].acertos};
                        `;

                    proximaAtualizacao = setTimeout(() => {
                        AtualizarRanking();
                    }, 2000);

                });
            } else {

                console.error("Nenhum dado encontrado");

                proximaAtualizacao = setTimeout(() => {
                    AtualizarRanking();
                }, 2000);

            }

        })
            .catch(function (erro) {
                console.error("Erro:", erro);
            });

    }

    
</script>
